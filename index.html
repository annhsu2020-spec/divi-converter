<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字轉語意 HTML 轉換器 - 專業摺疊版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 預覽區樣式：模擬網站實際摺疊呈現 */
        #previewArea .preview-container { border: 1px solid #e2e8f0; padding: 20px 32px; border-radius: 12px; background: white; }
        
        #previewArea details {
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }
        
        #previewArea details:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        #previewArea summary { 
            font-weight: 600; 
            color: #1e293b; 
            font-size: 1.15rem; 
            padding: 15px 0;
            cursor: pointer;
            list-style: none; /* 隱藏預設箭頭 */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* 隱藏 Safari 的預設箭頭 */
        #previewArea summary::-webkit-details-marker { display: none; }
        
        /* 自訂加減號圖示 */
        #previewArea summary::after {
            content: '+';
            font-size: 1.5rem;
            color: #3b82f6;
            font-weight: 400;
            transition: transform 0.3s ease;
        }
        
        #previewArea details[open] summary::after {
            content: '−'; /* 減號 */
            transform: rotate(180deg);
        }

        /* 答案樣式 */
        #previewArea .qa-answer { 
            font-weight: 400; 
            margin-left: 0; 
            padding: 0px 0px 20px 0px;
            line-height: 1.6; 
            color: #475569;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 font-sans text-slate-800">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    Divi 語意轉換器 <span class="text-blue-600">專業摺疊版 (Accordion)</span>
                </h1>
                <p class="text-slate-500 text-sm mt-1">已套用高階顧問建議：原生 HTML5 摺疊面板、無須 JS、含自動 Schema 生成</p>
            </div>
            <button id="clearBtn" class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-red-600 transition">清空內容</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Input -->
            <div class="flex flex-col">
                <label class="block mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest">1. 貼入原始文字</label>
                <textarea 
                    id="inputArea" 
                    class="w-full h-[650px] p-5 rounded-2xl border border-slate-200 shadow-sm focus:ring-4 focus:ring-blue-100 outline-none text-sm leading-relaxed transition-all"
                    placeholder="請貼入內容，每一組問答之間請空一行。
                    
例如：
Q1：為什麼要用 NotebookLM？
關鍵在於來源鎖定機制...

Q2：如何快速建立資料結構？
建議善用心智圖功能..."
                ></textarea>
            </div>

            <!-- Output -->
            <div class="flex flex-col">
                <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">2. 產出的 SEO 代碼 (含摺疊樣式與 Schema)</label>
                    <button id="copyBtn" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-200">
                        複製 HTML 代碼
                    </button>
                </div>
                <textarea 
                    id="outputArea" 
                    readonly
                    class="w-full h-[650px] p-5 rounded-2xl border border-slate-200 bg-slate-900 font-mono text-[11px] text-blue-300 outline-none shadow-inner"
                    placeholder="等待產出..."
                ></textarea>
            </div>

            <!-- Preview -->
            <div class="flex flex-col">
                <label class="block mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest">3. 即時預覽 (點擊可測試摺疊效果)</label>
                <div id="previewArea" class="w-full h-[650px] overflow-auto p-2 rounded-2xl border border-slate-200 bg-slate-100 shadow-inner">
                    <div class="text-slate-400 text-center mt-32 italic">請在左側輸入文字...</div>
                </div>
                <div id="statusMsg" class="mt-3 text-center text-xs font-bold text-green-600 opacity-0 transition-all transform translate-y-2">
                    ✓ 代碼已複製！請至 Divi 切換到「文字」模式後貼上。
                </div>
            </div>

        </div>
    </div>

    <script>
        const inputArea = document.getElementById('inputArea');
        const outputArea = document.getElementById('outputArea');
        const previewArea = document.getElementById('previewArea');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusMsg = document.getElementById('statusMsg');

        function convertLogic() {
            const rawText = inputArea.value.trim();
            if (!rawText) {
                outputArea.value = '';
                previewArea.innerHTML = '<div class="text-slate-400 text-center mt-32 italic">請在左側輸入文字...</div>';
                return;
            }

            const blocks = rawText.split(/\n\s*\n/);
            
            // 替 Divi 準備的內聯 CSS，包含自訂的 +/- 圖示與動畫效果
            let styleHeader = `<style>
  .divi-qa-container { margin-bottom: 20px; }
  .divi-qa-item { border-bottom: 1px solid #eee; margin-bottom: 5px; }
  .divi-qa-item:last-child { border-bottom: none; }
  
  .divi-qa-item summary { 
    font-weight: 600; 
    color: inherit; 
    font-size: 1.1em; 
    padding: 15px 0;
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .divi-qa-item summary::-webkit-details-marker { display: none; }
  .divi-qa-item summary::after {
    content: '+';
    font-size: 1.5em;
    color: #3b82f6; /* 您可以在 Divi 中修改這個顏色符合品牌色 */
    transition: transform 0.3s ease;
  }
  .divi-qa-item[open] summary::after {
    content: '−';
    transform: rotate(180deg);
  }
  
  .divi-qa-answer { 
    font-weight: 400; 
    margin-left: 0; 
    line-height: 1.6; 
    padding: 0px 0px 20px 0px; 
  }
</style>\n\n`;

            let htmlContent = '<div class="divi-qa-container">\n';
            
            let schemaData = {
                "@context": "https://schema.org",
                "@type": "FAQPage",
                "mainEntity": []
            };
            
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length > 0) {
                    const question = lines[0].trim();
                    const answers = lines.slice(1);
                    
                    // 使用 details 與 summary 建立摺疊結構
                    htmlContent += `  <details class="divi-qa-item">\n`;
                    htmlContent += `    <summary>${question}</summary>\n`;
                    
                    let schemaAnswerText = '';

                    if (answers.length > 0) {
                        const answerText = answers.map(l => l.trim()).join('<br>\n      ');
                        schemaAnswerText = answers.map(l => l.trim()).join('<br>');
                        htmlContent += `    <div class="divi-qa-answer">\n      ${answerText}\n    </div>\n`;
                    } else {
                        htmlContent += `    <div class="divi-qa-answer"></div>\n`;
                    }
                    
                    htmlContent += `  </details>\n`;

                    schemaData.mainEntity.push({
                        "@type": "Question",
                        "name": question,
                        "acceptedAnswer": {
                            "@type": "Answer",
                            "text": schemaAnswerText
                        }
                    });
                }
            });

            htmlContent += '</div>';
            
            const sTagOpen = '<scr' + 'ipt type="application/ld+json">';
            const sTagClose = '</scr' + 'ipt>';
            const schemaScript = `\n\n<!--搜尋引擎專用 FAQ Schema (請勿刪除) -->\n${sTagOpen}\n${JSON.stringify(schemaData, null, 2)}\n${sTagClose}`;
            
            outputArea.value = styleHeader + htmlContent + schemaScript;
            
            // 預覽區套用一層容器以顯示外框
            previewArea.innerHTML = `<div class="preview-container">${htmlContent}</div>`;
        }

        inputArea.addEventListener('input', convertLogic);

        copyBtn.addEventListener('click', () => {
            if (!outputArea.value) return;
            outputArea.select();
            document.execCommand('copy');
            
            statusMsg.classList.remove('opacity-0', 'translate-y-2');
            statusMsg.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                statusMsg.classList.add('opacity-0', 'translate-y-2');
                statusMsg.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        });

        clearBtn.addEventListener('click', () => {
            inputArea.value = '';
            convertLogic();
        });
    </script>
</body>
</html>
